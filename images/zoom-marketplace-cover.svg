    <path d="M0,10 Q0,0 10,0 L50,0 Q60,0 60,10 L60,80 Q60,110 30,120 Q0,110 0,80 Z" fill="white" opacity="0.15"/>
    <path d="M4,13 Q4,5 12,5 L48,5 Q56,5 56,13 L56,78 Q56,105 30,115 Q4,105 4,78 Z" fill="white" opacity="0.15"/>
