<svg xmlns="http://www.w3.org/2000/svg" width="1824" height="176" viewBox="0 0 1824 176">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#006699;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#005580;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990066;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#990066;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#990066;stop-opacity:0" />
