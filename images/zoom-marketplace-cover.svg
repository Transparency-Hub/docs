    <text x="212" y="17" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">🤖 AI Minutes</text>
    
    <!-- Pill 3 -->
    <rect x="284" y="0" width="150" height="26" rx="13" fill="white" opacity="0.12"/>
    <text x="359" y="17" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">🔒 Secure Recording</text>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="172" width="1824" height="4" fill="#990066" opacity="0.6"/>
